<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Ping Pong Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col font-sans selection:bg-emerald-500/30 transition-colors duration-500" id="appBody">

  <a href="#" class="block w-full text-center py-4 text-slate-400 hover:text-emerald-400 font-semibold transition-colors border-b border-slate-800">
    &larr; Back to Home
  </a>

  <div class="flex-1 flex flex-col items-center justify-center p-4 w-full">
    
    <div class="bg-slate-800 p-4 rounded-xl shadow-lg w-full max-w-md mb-4 border border-slate-700 flex justify-between items-center gap-4">
      
      <button onclick="toggleSides()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-300 py-2 px-3 rounded-lg text-sm font-semibold transition-colors flex justify-center items-center gap-2 active:scale-95">
        <span id="swapIcon">↔️</span> Swap Ends
      </button>

      <div class="flex flex-col items-end justify-center">
        <span class="text-xs font-semibold text-slate-400 mb-1">Best of 3</span>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" id="bo3Toggle" class="sr-only peer" onchange="toggleSettings()" checked>
          <div class="w-11 h-6 bg-slate-600 rounded-full peer peer-checked:bg-emerald-500 peer-checked:after:translate-x-full after:transition-all after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5"></div>
        </label>
      </div>
    </div>

    <div class="bg-slate-800 p-6 sm:p-8 rounded-2xl shadow-2xl max-w-md w-full text-center border border-slate-700 transition-all duration-500" id="mainCard">
      
      <div id="status" class="text-lg sm:text-xl font-bold text-slate-400 mb-6 h-10 flex items-center justify-center bg-slate-900 rounded-lg border border-transparent transition-all duration-300">
        Game 1: First to 11 (Win by 2)
      </div>

      <div id="playerBoard" class="flex justify-between items-stretch mb-8 gap-4 sm:gap-6 transition-all duration-500">
        
        <div id="p1Card" class="flex-1 bg-slate-700/50 p-4 rounded-xl border border-slate-600 transition-all duration-300 flex flex-col items-center">
          
          <div class="flex flex-col items-center w-full mb-1 gap-1">
            <input type="text" id="p1Name" value="Player 1" onfocus="this.select()" onchange="saveExtraState()" class="bg-transparent border-b border-transparent hover:border-slate-500 focus:border-emerald-500 focus:outline-none w-full text-center text-lg sm:text-xl font-bold text-slate-200 truncate transition-colors">
            <span id="p1Games" class="text-emerald-400 text-xs font-black bg-slate-900 px-2 py-0.5 rounded hidden whitespace-nowrap border border-emerald-500/20">0 Wins</span>
          </div>

          <div id="serve1" class="text-yellow-400 text-xs font-bold uppercase mt-1 tracking-wider h-4 transition-opacity mb-2">🏓 Serving</div>
          <div id="score1" class="text-6xl sm:text-7xl font-black mb-4 tabular-nums mt-auto">0</div>
          <button onclick="addPoint(1)" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 py-3 sm:py-4 rounded-lg font-bold text-lg transition-all active:scale-95 disabled:opacity-50 disabled:active:scale-100" id="btn1">+1</button>
        </div>

        <div id="vsText" class="text-2xl sm:text-3xl font-black text-slate-600 pb-16 flex items-center transition-colors duration-300">VS</div>

        <div id="p2Card" class="flex-1 bg-slate-700/50 p-4 rounded-xl border border-slate-600 transition-all duration-300 flex flex-col items-center">
          
          <div class="flex flex-col items-center w-full mb-1 gap-1">
             <input type="text" id="p2Name" value="Player 2" onfocus="this.select()" onchange="saveExtraState()" class="bg-transparent border-b border-transparent hover:border-slate-500 focus:border-blue-500 focus:outline-none w-full text-center text-lg sm:text-xl font-bold text-slate-200 truncate transition-colors">
             <span id="p2Games" class="text-blue-400 text-xs font-black bg-slate-900 px-2 py-0.5 rounded hidden whitespace-nowrap border border-blue-500/20">0 Wins</span>
          </div>

          <div id="serve2" class="text-yellow-400 text-xs font-bold uppercase mt-1 tracking-wider h-4 transition-opacity invisible mb-2">🏓 Serving</div>
          <div id="score2" class="text-6xl sm:text-7xl font-black mb-4 tabular-nums mt-auto">0</div>
          <button onclick="addPoint(2)" class="w-full bg-blue-500 hover:bg-blue-400 text-slate-900 py-3 sm:py-4 rounded-lg font-bold text-lg transition-all active:scale-95 disabled:opacity-50 disabled:active:scale-100" id="btn2">+1</button>
        </div>
      </div>

      <button onclick="nextGame()" id="nextGameBtn" class="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-900 py-4 rounded-lg font-black text-lg transition-all mb-4 hidden animate-pulse">
        Start Next Game (Swap Ends)
      </button>

      <div class="grid grid-cols-2 gap-4 mb-4" id="timeMachine">
        <button onclick="undo()" id="undoBtn" class="bg-slate-700 hover:bg-slate-600 text-slate-300 py-2 rounded-lg font-semibold transition-colors disabled:opacity-30 flex justify-center items-center gap-2">
          &#8617; Undo
        </button>
        <button onclick="redo()" id="redoBtn" class="bg-slate-700 hover:bg-slate-600 text-slate-300 py-2 rounded-lg font-semibold transition-colors disabled:opacity-30 flex justify-center items-center gap-2">
          Redo &#8618;
        </button>
      </div>

      <button onclick="resetMatch()" class="w-full bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/50 py-3 rounded-lg font-bold transition-colors mt-2">Reset Entire Match</button>
    </div>
  </div>

  <script>
    // State Architecture
    let matchHistory = [{ 
        p1: 0, p2: 0, 
        p1Games: 0, p2Games: 0, 
        gameNum: 1, 
        initialServer: 1 
    }];
    let currentStep = 0;
    
    // Extra UI State
    let isBo3 = true;
    let isSwapped = false;
    let p1NameStr = "Player 1";
    let p2NameStr = "Player 2";

    let isCurrentGameOver = false;
    let isMatchOver = false;

    const STORAGE_KEY = 'pingPongTrackerProV4';

    window.onload = () => {
      const savedData = localStorage.getItem(STORAGE_KEY);
      if (savedData) {
        const parsed = JSON.parse(savedData);
        matchHistory = parsed.history || matchHistory;
        currentStep = parsed.step || 0;
        isBo3 = parsed.isBo3 !== undefined ? parsed.isBo3 : true;
        isSwapped = parsed.isSwapped || false;
        p1NameStr = parsed.p1NameStr || "Player 1";
        p2NameStr = parsed.p2NameStr || "Player 2";
        
        document.getElementById('bo3Toggle').checked = isBo3;
        document.getElementById('p1Name').value = p1NameStr;
        document.getElementById('p2Name').value = p2NameStr;
      }
      updateUI();
    };

    const saveData = () => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        history: matchHistory, step: currentStep, isBo3, isSwapped, p1NameStr, p2NameStr
      }));
    };

    const saveExtraState = () => {
        p1NameStr = document.getElementById('p1Name').value;
        p2NameStr = document.getElementById('p2Name').value;
        saveData();
    }

    const toggleSettings = () => {
      isBo3 = document.getElementById('bo3Toggle').checked;
      updateUI();
    };

    const toggleSides = () => {
        isSwapped = !isSwapped;
        updateUI();
    }

    const addPoint = (player) => {
      if (isCurrentGameOver) return;
      
      matchHistory = matchHistory.slice(0, currentStep + 1);
      const state = matchHistory[currentStep];
      
      const newState = { 
        ...state,
        p1: state.p1 + (player === 1 ? 1 : 0), 
        p2: state.p2 + (player === 2 ? 1 : 0)
      };
      
      matchHistory.push(newState);
      currentStep++;
      updateUI();
    };

    const nextGame = () => {
      const state = matchHistory[currentStep];
      const p1Won = state.p1 > state.p2;
      
      const newState = {
        p1: 0, p2: 0,
        p1Games: state.p1Games + (p1Won ? 1 : 0),
        p2Games: state.p2Games + (!p1Won ? 1 : 0),
        gameNum: state.gameNum + 1,
        initialServer: state.initialServer === 1 ? 2 : 1
      };

      // Automatically visually swap sides when a new game starts
      isSwapped = !isSwapped;

      matchHistory = matchHistory.slice(0, currentStep + 1);
      matchHistory.push(newState);
      currentStep++;
      updateUI();
    };

    const undo = () => { if (currentStep > 0) { currentStep--; updateUI(); } };
    const redo = () => { if (currentStep < matchHistory.length - 1) { currentStep++; updateUI(); } };

    const resetMatch = () => {
      if(confirm('Wipe the board and start a fresh match?')) {
        matchHistory = [{ p1: 0, p2: 0, p1Games: 0, p2Games: 0, gameNum: 1, initialServer: 1 }];
        currentStep = 0;
        isSwapped = false;
        updateUI();
      }
    };

    const updateUI = () => {
      const state = matchHistory[currentStep];
      document.getElementById('score1').textContent = state.p1;
      document.getElementById('score2').textContent = state.p2;

      const isDeuce = state.p1 >= 10 && state.p2 >= 10;
      isCurrentGameOver = ((state.p1 >= 11 || state.p2 >= 11) && Math.abs(state.p1 - state.p2) >= 2);

      let virtualP1Games = state.p1Games + (isCurrentGameOver && state.p1 > state.p2 ? 1 : 0);
      let virtualP2Games = state.p2Games + (isCurrentGameOver && state.p2 > state.p1 ? 1 : 0);
      isMatchOver = isBo3 && (virtualP1Games === 2 || virtualP2Games === 2);

      // DOM Elements
      const playerBoard = document.getElementById('playerBoard');
      const p1Card = document.getElementById('p1Card');
      const p2Card = document.getElementById('p2Card');
      const vsText = document.getElementById('vsText');
      const statusEl = document.getElementById('status');
      const serve1El = document.getElementById('serve1');
      const serve2El = document.getElementById('serve2');
      const btn1 = document.getElementById('btn1');
      const btn2 = document.getElementById('btn2');
      const nextGameBtn = document.getElementById('nextGameBtn');
      const timeMachine = document.getElementById('timeMachine');

      // Best of 3 Game Trackers
      const p1GamesEl = document.getElementById('p1Games');
      const p2GamesEl = document.getElementById('p2Games');
      p1GamesEl.style.display = isBo3 ? 'block' : 'none';
      p2GamesEl.style.display = isBo3 ? 'block' : 'none';
      p1GamesEl.textContent = `${state.p1Games} Wins`;
      p2GamesEl.textContent = `${state.p2Games} Wins`;

      // ITTF Rule: Change ends at 5 points in the decider game
      const isDecider = isBo3 && state.gameNum === 3;
      const swapAt5 = isDecider && (state.p1 === 5 || state.p2 === 5) && !isCurrentGameOver;

      // Handle Visual Swapping
      playerBoard.style.flexDirection = isSwapped ? 'row-reverse' : 'row';
      document.getElementById('swapIcon').style.transform = isSwapped ? 'rotateY(180deg)' : 'none';

      // Base High-Stakes Styles
      p1Card.className = 'flex-1 bg-slate-700/50 p-4 rounded-xl border transition-all duration-300 flex flex-col items-center ' + (isDeuce && !isCurrentGameOver ? 'border-yellow-500/50 shadow-[0_0_15px_rgba(234,179,8,0.15)]' : 'border-slate-600');
      p2Card.className = 'flex-1 bg-slate-700/50 p-4 rounded-xl border transition-all duration-300 flex flex-col items-center ' + (isDeuce && !isCurrentGameOver ? 'border-yellow-500/50 shadow-[0_0_15px_rgba(234,179,8,0.15)]' : 'border-slate-600');
      vsText.className = 'text-2xl sm:text-3xl font-black pb-16 flex items-center transition-colors duration-300 ' + (isDeuce && !isCurrentGameOver ? 'text-yellow-500/80' : 'text-slate-600');

      if (isCurrentGameOver) {
        if (isMatchOver) {
            const winner = virtualP1Games === 2 ? p1NameStr : p2NameStr;
            statusEl.textContent = `🏆 ${winner} WINS THE MATCH 🏆`;
            statusEl.className = 'text-lg sm:text-xl font-bold text-yellow-400 mb-6 h-10 flex items-center justify-center bg-slate-900 rounded-lg border border-transparent';
            nextGameBtn.classList.add('hidden');
            
            if(virtualP1Games === 2) {
                p1Card.classList.replace('border-slate-600', 'border-emerald-500');
                p1Card.classList.replace('border-yellow-500/50', 'border-emerald-500');
            } else {
                p2Card.classList.replace('border-slate-600', 'border-blue-500');
                p2Card.classList.replace('border-yellow-500/50', 'border-blue-500');
            }
        } else if (isBo3) {
            statusEl.textContent = `Game ${state.gameNum} Complete!`;
            statusEl.className = 'text-lg sm:text-xl font-bold text-emerald-400 mb-6 h-10 flex items-center justify-center bg-slate-900 rounded-lg border border-transparent';
            nextGameBtn.classList.remove('hidden');
            timeMachine.classList.add('hidden');
        } else {
            const winner = state.p1 > state.p2 ? p1NameStr : p2NameStr;
            statusEl.textContent = `🏆 ${winner} Takes the Game!`;
            statusEl.className = 'text-lg sm:text-xl font-bold text-yellow-400 mb-6 h-10 flex items-center justify-center bg-slate-900 rounded-lg border border-transparent';
        }
        
        serve1El.classList.add('invisible');
        serve2El.classList.add('invisible');
        btn1.disabled = true;
        btn2.disabled = true;

      } else {
        nextGameBtn.classList.add('hidden');
        timeMachine.classList.remove('hidden');
        btn1.disabled = false;
        btn2.disabled = false;

        let servesPassed = 0;
        if (isDeuce) {
            servesPassed = 10 + (state.p1 + state.p2 - 20); 
        } else {
            servesPassed = Math.floor((state.p1 + state.p2) / 2); 
        }
        
        let p1Serves = (servesPassed % 2 === 0) ? (state.initialServer === 1) : (state.initialServer === 2);

        serve1El.classList.toggle('invisible', !p1Serves);
        serve2El.classList.toggle('invisible', p1Serves);

        if (swapAt5) {
             statusEl.innerHTML = '<span class="animate-pulse text-rose-400">🔄 SWAP ENDS 🔄</span>';
             statusEl.className = 'text-lg sm:text-xl font-bold mb-6 h-10 flex items-center justify-center bg-rose-900/20 rounded-lg border border-rose-500/30 shadow-inner';
        } else if (isDeuce) {
             statusEl.innerHTML = '<span class="animate-pulse text-yellow-400">🔥 SUDDEN DEATH DUEL 🔥</span>';
             statusEl.className = 'text-lg sm:text-xl font-bold mb-6 h-10 flex items-center justify-center bg-yellow-900/20 rounded-lg border border-yellow-500/30 shadow-inner';
        } else {
             statusEl.textContent = `Game ${state.gameNum}: First to 11`;
             statusEl.className = 'text-lg sm:text-xl font-bold text-slate-400 mb-6 h-10 flex items-center justify-center bg-slate-900 rounded-lg border border-transparent transition-all duration-300';
        }
      }

      document.getElementById('undoBtn').disabled = currentStep === 0;
      document.getElementById('redoBtn').disabled = currentStep === matchHistory.length - 1;

      saveData();
    };
  </script>
</body>
</html>
