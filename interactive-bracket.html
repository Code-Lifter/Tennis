<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Bracket</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    
    <!-- Top Navigation -->
    <div class="bg-white shadow-sm p-4 mb-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="/" class="text-blue-600 font-bold hover:text-blue-800 transition-colors">← Home</a>
            <button onclick="resetTournament()" class="bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 px-4 py-2 rounded-lg font-semibold text-sm transition-all">
                Reset Tournament
            </button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 md:px-10 pb-10">
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <h1 class="text-3xl font-black text-slate-800 mb-2 text-center italic tracking-tight">BRACKET MASTER</h1>
            <p class="text-center text-slate-500 mb-8 text-sm md:text-base">Click a player's name to advance them to the next round.</p>
            
            <!-- Setup -->
            <div id="setupArea" class="mb-10 flex flex-col items-center gap-6">
                <textarea id="playerInput" class="w-full max-w-md p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none transition-all shadow-inner" rows="4" placeholder="Enter names (one per line)"></textarea>
                
                <div class="flex flex-col gap-3 w-full max-w-md">
                    <button onclick="initializeTournament(false)" class="bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-10 rounded-xl transition-all transform hover:scale-105 shadow-md">
                        Start As Ordered
                    </button>
                    <button onclick="initializeTournament(true)" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-10 rounded-xl transition-all transform hover:scale-105 shadow-md border border-blue-700">
                        🎲 Start Randomized
                    </button>
                </div>
            </div>

            <!-- The Bracket -->
            <div id="bracketContainer" class="flex justify-start gap-8 overflow-x-auto pb-4">
                <!-- Rounds appear here -->
            </div>
        </div>
    </div>

    <script>
        let tournamentState = null;

        document.addEventListener('DOMContentLoaded', () => {
            const savedState = localStorage.getItem('bracketMasterState');
            if (savedState) {
                tournamentState = JSON.parse(savedState);
                document.getElementById('setupArea').classList.add('hidden');
                renderBracket();
            }
        });

        // Added parameter to track if we should shuffle
        function initializeTournament(randomize = false) {
            const input = document.getElementById('playerInput').value.trim();
            const players = input.split('\n').map(p => p.trim()).filter(p => p !== "");
            
            if (players.length < 2) return alert("Add at least 2 players!");

            let currentPlayers = [...players];

            // The Fisher-Yates Shuffle Algorithm
            if (randomize) {
                for (let i = currentPlayers.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [currentPlayers[i], currentPlayers[j]] = [currentPlayers[j], currentPlayers[i]];
                }
            }

            const participantCount = currentPlayers.length;
            const roundCount = Math.ceil(Math.log2(participantCount));
            
            tournamentState = {
                totalRounds: roundCount,
                slots: [] 
            };

            for (let r = 0; r <= roundCount; r++) {
                const matchCount = r === roundCount ? 1 : Math.pow(2, roundCount - r - 1);
                tournamentState.slots[r] = [];

                for (let m = 0; m < matchCount; m++) {
                    const slotCount = r === roundCount ? 1 : 2;
                    tournamentState.slots[r][m] = [];
                    
                    for (let s = 0; s < slotCount; s++) {
                        if (r === 0 && currentPlayers.length > 0) {
                            tournamentState.slots[r][m][s] = currentPlayers.shift();
                        } else {
                            tournamentState.slots[r][m][s] = null;
                        }
                    }
                }
            }

            saveState();
            document.getElementById('setupArea').classList.add('hidden');
            renderBracket();
        }

        function renderBracket() {
            const container = document.getElementById('bracketContainer');
            container.innerHTML = '';

            if (!tournamentState) return;

            tournamentState.slots.forEach((round, r) => {
                const roundDiv = document.createElement('div');
                roundDiv.className = "flex flex-col justify-around gap-8 min-w-[160px] md:min-w-[180px]";

                round.forEach((match, m) => {
                    const matchDiv = document.createElement('div');
                    matchDiv.className = "flex flex-col gap-1";

                    match.forEach((playerName, s) => {
                        const slot = document.createElement('div');
                        slot.className = "h-10 px-3 flex items-center bg-slate-50 border-2 border-slate-200 rounded-lg text-sm font-bold text-slate-700 cursor-pointer hover:bg-blue-50 hover:border-blue-300 transition-all truncate select-none shadow-sm";
                        
                        slot.innerText = playerName || "—";
                        slot.onclick = () => advancePlayer(r, m, playerName);
                        
                        matchDiv.appendChild(slot);
                    });
                    roundDiv.appendChild(matchDiv);
                });
                container.appendChild(roundDiv);
            });
        }

        function advancePlayer(currentRound, currentMatch, playerName) {
            if (!playerName) return;

            const nextRound = currentRound + 1;
            
            if (nextRound > tournamentState.totalRounds) {
                alert("🏆 WE HAVE A WINNER: " + playerName);
                return;
            }

            const nextMatch = Math.floor(currentMatch / 2);
            const nextSlot = currentMatch % 2;

            tournamentState.slots[nextRound][nextMatch][nextSlot] = playerName;
            saveState();
            renderBracket();
        }

        function saveState() {
            localStorage.setItem('bracketMasterState', JSON.stringify(tournamentState));
        }

        function resetTournament() {
            if(confirm("Wipe the bracket? All current progress will be destroyed.")) {
                localStorage.removeItem('bracketMasterState');
                tournamentState = null;
                document.getElementById('setupArea').classList.remove('hidden');
                document.getElementById('playerInput').value = '';
                document.getElementById('bracketContainer').innerHTML = '';
            }
        }
    </script>
</body>
</html>
