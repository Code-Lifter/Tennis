<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏸 Badminton Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after {
      font-family: 'Barlow Condensed', sans-serif;
    }

    body {
      background-color: #04101c;
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 36px 36px;
    }

    /* ── Score digits ── */
    .score-num {
      font-family: 'Bebas Neue', sans-serif !important;
      line-height: 1;
      letter-spacing: 0.03em;
    }

    /* ── Cards ── */
    .court-card {
      background: linear-gradient(160deg, #0d2645 0%, #091e38 55%, #0d2645 100%);
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 30px 70px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .controls-card {
      background: rgba(8,20,36,0.95);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .p1-card {
      background: rgba(6,182,212,0.04);
      border: 1px solid rgba(6,182,212,0.18);
      transition: all 0.3s ease;
    }

    .p2-card {
      background: rgba(234,88,12,0.04);
      border: 1px solid rgba(234,88,12,0.18);
      transition: all 0.3s ease;
    }

    /* ── Buttons ── */
    .btn-p1 {
      display: block;
      width: 100%;
      padding: 0.75rem;
      border-radius: 0.5rem;
      font-family: 'Bebas Neue', sans-serif !important;
      font-size: 1.7rem;
      letter-spacing: 0.15em;
      color: white;
      background: linear-gradient(135deg, #0891b2, #06b6d4);
      border: 1px solid rgba(6,182,212,0.45);
      box-shadow: 0 4px 22px rgba(6,182,212,0.22);
      transition: all 0.15s ease;
    }
    .btn-p1:hover:not(:disabled) {
      background: linear-gradient(135deg, #06b6d4, #22d3ee);
      box-shadow: 0 7px 28px rgba(6,182,212,0.42);
      transform: translateY(-1px);
    }
    .btn-p1:active:not(:disabled) { transform: scale(0.97); }
    .btn-p1:disabled { opacity: 0.22; cursor: not-allowed; }

    .btn-p2 {
      display: block;
      width: 100%;
      padding: 0.75rem;
      border-radius: 0.5rem;
      font-family: 'Bebas Neue', sans-serif !important;
      font-size: 1.7rem;
      letter-spacing: 0.15em;
      color: white;
      background: linear-gradient(135deg, #c2410c, #ea580c);
      border: 1px solid rgba(234,88,12,0.45);
      box-shadow: 0 4px 22px rgba(234,88,12,0.22);
      transition: all 0.15s ease;
    }
    .btn-p2:hover:not(:disabled) {
      background: linear-gradient(135deg, #ea580c, #f97316);
      box-shadow: 0 7px 28px rgba(234,88,12,0.42);
      transform: translateY(-1px);
    }
    .btn-p2:active:not(:disabled) { transform: scale(0.97); }
    .btn-p2:disabled { opacity: 0.22; cursor: not-allowed; }

    /* ── Net divider ── */
    .net-divider {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 4rem;
      gap: 0;
    }

    .net-post {
      width: 3px;
      height: 14px;
      border-radius: 2px;
      background: rgba(255,255,255,0.38);
    }

    .net-strands {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 3px 0;
    }

    .net-strand {
      width: 2px;
      height: 6px;
      border-radius: 1px;
      background: rgba(255,255,255,0.16);
    }

    /* ── Serving glow ── */
    @keyframes serveGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(251,191,36,0.3); }
      50%        { box-shadow: 0 0 22px rgba(251,191,36,0.65); }
    }
    .serve-glow {
      animation: serveGlow 1.8s ease-in-out infinite;
    }

    /* ── Decorative center line on card ── */
    .court-center-line {
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      background: linear-gradient(to bottom,
        transparent,
        rgba(255,255,255,0.05) 20%,
        rgba(255,255,255,0.05) 80%,
        transparent
      );
      pointer-events: none;
    }

    /* ── Watermark ── */
    .shuttle-watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 110px;
      opacity: 0.025;
      pointer-events: none;
      user-select: none;
    }

    /* ── Name inputs ── */
    input[type="text"] {
      font-family: 'Barlow Condensed', sans-serif !important;
      letter-spacing: 0.08em;
    }

    /* ── Header ── */
    .site-header {
      background: rgba(4,16,28,0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    /* ── Details Reset ── */
    details > summary {
      list-style: none;
    }
    details > summary::-webkit-details-marker {
      display: none;
    }
  </style>
</head>

<body class="text-white min-h-screen flex flex-col selection:bg-cyan-500/25" id="appBody">

  <!-- Header -->
  <div class="site-header">
    <a href="https://code-lifter.github.io/Tennis/" class="flex items-center justify-center gap-2 py-3 text-white/35 hover:text-white/65 font-bold transition-colors text-xs tracking-widest uppercase">
      ← Home
    </a>
  </div>

  <div class="flex-1 flex flex-col items-center justify-center p-3 sm:p-4 w-full">

    <!-- Controls Accordion -->
    <details class="w-full max-w-md mb-3 group">
      <summary class="controls-card p-3 sm:p-4 rounded-xl cursor-pointer flex justify-between items-center text-white/60 hover:text-white transition-colors">
        <span class="font-bold tracking-widest uppercase text-sm flex items-center gap-2">
          ⚙️ Match Settings
        </span>
        <span class="transition-transform duration-300 group-open:-rotate-180 opacity-50 text-xs">▼</span>
      </summary>
      
      <div class="controls-card mt-2 p-4 rounded-xl flex flex-col gap-4">
        
        <!-- Game Length Segmented Control -->
        <div class="flex flex-col gap-1.5">
          <span class="text-[11px] font-bold text-white/45 tracking-widest uppercase text-center">Points Per Game</span>
          <div class="flex bg-white/5 p-1 rounded-lg">
            <label class="flex-1 text-center cursor-pointer">
              <input type="radio" name="gameLength" id="gl11" onchange="toggleSettings()" class="sr-only peer">
              <div class="py-1.5 rounded-md text-xs sm:text-sm font-bold tracking-widest uppercase text-white/40 peer-checked:text-white peer-checked:bg-cyan-600/90 peer-checked:shadow-md transition-all">First to 11</div>
            </label>
            <label class="flex-1 text-center cursor-pointer">
              <input type="radio" name="gameLength" id="gl21" onchange="toggleSettings()" class="sr-only peer" checked>
              <div class="py-1.5 rounded-md text-xs sm:text-sm font-bold tracking-widest uppercase text-white/40 peer-checked:text-white peer-checked:bg-cyan-600/90 peer-checked:shadow-md transition-all">First to 21</div>
            </label>
          </div>
        </div>

        <!-- Format Segmented Control -->
        <div class="flex flex-col gap-1.5">
          <span class="text-[11px] font-bold text-white/45 tracking-widest uppercase text-center">Match Format</span>
          <div class="flex bg-white/5 p-1 rounded-lg">
            <label class="flex-1 text-center cursor-pointer">
              <input type="radio" name="matchFormat" id="mf1" onchange="toggleSettings()" class="sr-only peer">
              <div class="py-1.5 rounded-md text-xs sm:text-sm font-bold tracking-widest uppercase text-white/40 peer-checked:text-white peer-checked:bg-cyan-600/90 peer-checked:shadow-md transition-all">Single Game</div>
            </label>
            <label class="flex-1 text-center cursor-pointer">
              <input type="radio" name="matchFormat" id="mf3" onchange="toggleSettings()" class="sr-only peer" checked>
              <div class="py-1.5 rounded-md text-xs sm:text-sm font-bold tracking-widest uppercase text-white/40 peer-checked:text-white peer-checked:bg-cyan-600/90 peer-checked:shadow-md transition-all">Best of 3</div>
            </label>
          </div>
        </div>

        <!-- Deuce Cap Segmented Control -->
        <div class="flex flex-col gap-1.5">
          <span class="text-[11px] font-bold text-white/45 tracking-widest uppercase text-center">Deuce Rules</span>
          <div class="flex bg-white/5 p-1 rounded-lg">
            <label class="flex-1 text-center cursor-pointer">
              <input type="radio" name="deuceCap" id="dcNoCap" onchange="toggleSettings()" class="sr-only peer">
              <div class="py-1.5 rounded-md text-xs sm:text-sm font-bold tracking-widest uppercase text-white/40 peer-checked:text-white peer-checked:bg-cyan-600/90 peer-checked:shadow-md transition-all">Win by 2</div>
            </label>
            <label class="flex-1 text-center cursor-pointer">
              <input type="radio" name="deuceCap" id="dcCap" onchange="toggleSettings()" class="sr-only peer" checked>
              <div class="py-1.5 rounded-md text-xs sm:text-sm font-bold tracking-widest uppercase text-white/40 peer-checked:text-white peer-checked:bg-cyan-600/90 peer-checked:shadow-md transition-all">Hard Cap</div>
            </label>
          </div>
        </div>

      </div>
    </details>

    <!-- Main Card -->
    <div class="court-card p-4 sm:p-6 rounded-2xl max-w-md w-full text-center relative overflow-hidden" id="mainCard">

      <div class="court-center-line"></div>
      <div class="shuttle-watermark">🏸</div>

      <!-- Status -->
      <div id="status"
        class="text-base sm:text-lg font-bold text-white/45 mb-4 h-10 flex items-center justify-center bg-white/5 rounded-lg border border-transparent tracking-wider transition-all duration-300">
        Game 1 · First to 21
      </div>

      <!-- Player Board -->
      <div id="playerBoard" class="flex justify-between items-stretch mb-6 gap-3 sm:gap-4 transition-all duration-500">

        <!-- Player 1 -->
        <div id="p1Card" class="p1-card flex-1 p-3 sm:p-4 rounded-xl flex flex-col items-center relative z-0">

          <div class="flex flex-col items-center w-full mb-1 gap-1">
            <input type="text" id="p1Name" value="Player 1"
              onfocus="this.select()" onchange="saveExtraState()"
              class="bg-transparent border-b border-transparent hover:border-white/20 focus:border-cyan-500
                focus:outline-none w-full text-center text-lg font-bold text-white truncate transition-colors
                tracking-wider uppercase">
            <span id="p1Games"
              class="text-cyan-400 text-xs font-black bg-cyan-950/50 px-2 py-0.5 rounded hidden
                whitespace-nowrap border border-cyan-500/20 tracking-widest uppercase">0 Wins</span>
          </div>

          <div id="score1" class="score-num text-8xl sm:text-9xl my-1 text-sky-200 tabular-nums">0</div>

          <div id="logistics1"
            class="bg-black/40 border border-amber-500/55 rounded-lg p-2 mb-3 w-full h-12
              flex flex-col justify-center items-center transition-all serve-glow">
            <span class="text-amber-400 text-[10px] sm:text-xs font-bold uppercase tracking-widest block leading-tight">🏸 Serving</span>
            <span id="side1" class="text-white text-xs sm:text-sm font-semibold leading-tight">Right Court</span>
          </div>

          <button onclick="addPoint(1)" class="btn-p1 mt-auto" id="btn1">+ 1</button>
        </div>

        <!-- Net Divider with Swap Button -->
        <div id="vsText" class="net-divider relative z-10">
          <div class="net-post"></div>
          <div class="net-strands">
            <div class="net-strand"></div>
            <div class="net-strand"></div>
          </div>
          
          <!-- Swap Ends Button -->
          <button onclick="toggleSides()" 
            class="my-2 w-9 h-9 rounded-full bg-[#0d2645] border border-white/20 text-white/55 hover:text-white hover:bg-white/10 hover:border-cyan-500/50 flex items-center justify-center transition-all active:scale-90 shadow-xl"
            title="Swap Ends">
            <span id="swapIcon" class="transition-transform duration-300 text-sm">↔️</span>
          </button>

          <div class="net-strands">
            <div class="net-strand"></div>
            <div class="net-strand"></div>
          </div>
          <div class="net-post"></div>
        </div>

        <!-- Player 2 -->
        <div id="p2Card" class="p2-card flex-1 p-3 sm:p-4 rounded-xl flex flex-col items-center relative z-0">

          <div class="flex flex-col items-center w-full mb-1 gap-1">
            <input type="text" id="p2Name" value="Player 2"
              onfocus="this.select()" onchange="saveExtraState()"
              class="bg-transparent border-b border-transparent hover:border-white/20 focus:border-orange-500
                focus:outline-none w-full text-center text-lg font-bold text-white truncate transition-colors
                tracking-wider uppercase">
            <span id="p2Games"
              class="text-orange-400 text-xs font-black bg-orange-950/50 px-2 py-0.5 rounded hidden
                whitespace-nowrap border border-orange-500/20 tracking-widest uppercase">0 Wins</span>
          </div>

          <div id="score2" class="score-num text-8xl sm:text-9xl my-1 text-orange-200 tabular-nums">0</div>

          <div id="logistics2"
            class="bg-black/20 border border-white/10 rounded-lg p-2 mb-3 w-full h-12
              flex flex-col justify-center items-center opacity-55 transition-all">
            <span class="text-white/45 text-[10px] sm:text-xs font-bold uppercase tracking-widest block leading-tight">Receiving</span>
            <span id="side2" class="text-white/35 text-xs sm:text-sm font-semibold leading-tight">Ready</span>
          </div>

          <button onclick="addPoint(2)" class="btn-p2 mt-auto" id="btn2">+ 1</button>
        </div>
      </div>

      <!-- Next Game button -->
      <button onclick="nextGame()" id="nextGameBtn"
        class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 py-3 sm:py-4 rounded-lg font-black
          text-base sm:text-lg tracking-widest uppercase transition-all mb-4 hidden animate-pulse">
        🏸 Start Next Game · Swap Ends
      </button>

      <!-- Undo / Redo -->
      <div class="grid grid-cols-2 gap-3 mb-3" id="timeMachine">
        <button onclick="undo()" id="undoBtn"
          class="bg-white/5 hover:bg-white/10 border border-white/10 text-white/55 py-2 rounded-lg
            font-bold transition-colors disabled:opacity-20 flex justify-center items-center gap-2
            text-sm tracking-wider uppercase">
          ↩ Undo
        </button>
        <button onclick="redo()" id="redoBtn"
          class="bg-white/5 hover:bg-white/10 border border-white/10 text-white/55 py-2 rounded-lg
            font-bold transition-colors disabled:opacity-20 flex justify-center items-center gap-2
            text-sm tracking-wider uppercase">
          Redo ↪
        </button>
      </div>

      <!-- Reset -->
      <button onclick="resetMatch()"
        class="w-full bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/30
          py-2.5 rounded-lg font-bold transition-colors text-sm tracking-widest uppercase">
        Reset Entire Match
      </button>
    </div>

  </div>

  <script>
    // ─────────────────────────────────────────────
    // State Architecture 
    // ─────────────────────────────────────────────
    let matchHistory = [{
      p1: 0, p2: 0, server: 1,
      p1Games: 0, p2Games: 0,
      gameNum: 1, isSwapped: false
    }];
    let currentStep = 0;

    let isFirstTo11 = false;
    let isBo3      = true;
    let isHardCap  = true;
    let p1NameStr  = "Player 1";
    let p2NameStr  = "Player 2";

    let isCurrentGameOver = false;
    let isMatchOver       = false;

    const STORAGE_KEY = 'badmintonTrackerStateV9';

    window.onload = () => {
      const savedData = localStorage.getItem(STORAGE_KEY);
      if (savedData) {
        const parsed = JSON.parse(savedData);
        matchHistory = parsed.history || matchHistory;
        currentStep  = parsed.step    || 0;
        
        isFirstTo11  = parsed.isFirstTo11 !== undefined ? parsed.isFirstTo11 : false;
        isBo3        = parsed.isBo3       !== undefined ? parsed.isBo3       : true;
        isHardCap    = parsed.isHardCap   !== undefined ? parsed.isHardCap   : true;
        p1NameStr    = parsed.p1NameStr || "Player 1";
        p2NameStr    = parsed.p2NameStr || "Player 2";
      }

      // Sync UI radios with loaded state
      document.getElementById(isFirstTo11 ? 'gl11' : 'gl21').checked = true;
      document.getElementById(isBo3 ? 'mf3' : 'mf1').checked = true;
      document.getElementById(isHardCap ? 'dcCap' : 'dcNoCap').checked = true;
      
      document.getElementById('p1Name').value = p1NameStr;
      document.getElementById('p2Name').value = p2NameStr;

      updateUI();
    };

    const saveData = () => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        history: matchHistory, step: currentStep,
        isFirstTo11, isBo3, isHardCap, p1NameStr, p2NameStr
      }));
    };

    const saveExtraState = () => {
      p1NameStr = document.getElementById('p1Name').value;
      p2NameStr = document.getElementById('p2Name').value;
      saveData();
    };

    const toggleSettings = () => {
      isFirstTo11 = document.getElementById('gl11').checked;
      isBo3       = document.getElementById('mf3').checked;
      isHardCap   = document.getElementById('dcCap').checked;
      updateUI();
    };

    const toggleSides = () => {
      matchHistory = matchHistory.slice(0, currentStep + 1);
      const state  = matchHistory[currentStep];
      matchHistory.push({ ...state, isSwapped: !state.isSwapped });
      currentStep++;
      updateUI();
    };

    const addPoint = (player) => {
      if (isCurrentGameOver) return;
      matchHistory = matchHistory.slice(0, currentStep + 1);
      const state  = matchHistory[currentStep];
      matchHistory.push({
        p1:      state.p1 + (player === 1 ? 1 : 0),
        p2:      state.p2 + (player === 2 ? 1 : 0),
        server:  player,
        p1Games: state.p1Games,
        p2Games: state.p2Games,
        gameNum: state.gameNum,
        isSwapped: state.isSwapped
      });
      currentStep++;
      updateUI();
    };

    const nextGame = () => {
      const state = matchHistory[currentStep];
      const p1Won = state.p1 > state.p2;
      matchHistory = matchHistory.slice(0, currentStep + 1);
      matchHistory.push({
        p1: 0, p2: 0,
        server:  p1Won ? 1 : 2,
        p1Games: state.p1Games + (p1Won ? 1 : 0),
        p2Games: state.p2Games + (!p1Won ? 1 : 0),
        gameNum: state.gameNum + 1,
        isSwapped: !state.isSwapped
      });
      currentStep++;
      updateUI();
    };

    const undo = () => { if (currentStep > 0)                            { currentStep--; updateUI(); } };
    const redo = () => { if (currentStep < matchHistory.length - 1)      { currentStep++; updateUI(); } };

    const resetMatch = () => {
      if (confirm('Wipe the entire match and start fresh?')) {
        matchHistory = [{ p1: 0, p2: 0, server: 1, p1Games: 0, p2Games: 0, gameNum: 1, isSwapped: false }];
        currentStep  = 0;
        updateUI();
      }
    };

    const getServeSide = (score) => score % 2 === 0 ? 'Right Court' : 'Left Court';

    // ─────────────────────────────────────────────
    // updateUI 
    // ─────────────────────────────────────────────
    const updateUI = () => {
      const state = matchHistory[currentStep];

      // Set targets based on game length mode
      const WIN_TARGET   = isFirstTo11 ? 11 : 21;
      const CAP_TARGET   = isFirstTo11 ? 15 : 30; // Scaled cap down for short format
      const SWAP_TARGET  = isFirstTo11 ? 6 : 11;
      const DEUCE_TARGET = WIN_TARGET - 1;

      document.getElementById('score1').textContent = state.p1;
      document.getElementById('score2').textContent = state.p2;

      const isDeuce  = state.p1 >= DEUCE_TARGET && state.p2 >= DEUCE_TARGET;
      const isCapped = isHardCap && state.p1 === (CAP_TARGET - 1) && state.p2 === (CAP_TARGET - 1);

      let winCondition = (state.p1 >= WIN_TARGET || state.p2 >= WIN_TARGET) && Math.abs(state.p1 - state.p2) >= 2;
      if (isHardCap) winCondition = winCondition || state.p1 === CAP_TARGET || state.p2 === CAP_TARGET;
      isCurrentGameOver = winCondition;

      let virtualP1Games = state.p1Games + (isCurrentGameOver && state.p1 > state.p2 ? 1 : 0);
      let virtualP2Games = state.p2Games + (isCurrentGameOver && state.p2 > state.p1 ? 1 : 0);
      isMatchOver = isBo3 && (virtualP1Games === 2 || virtualP2Games === 2);

      const playerBoard = document.getElementById('playerBoard');
      const statusEl    = document.getElementById('status');
      const logistics1  = document.getElementById('logistics1');
      const logistics2  = document.getElementById('logistics2');
      const btn1        = document.getElementById('btn1');
      const btn2        = document.getElementById('btn2');
      const nextGameBtn = document.getElementById('nextGameBtn');
      const timeMachine = document.getElementById('timeMachine');
      const p1GamesEl   = document.getElementById('p1Games');
      const p2GamesEl   = document.getElementById('p2Games');

      // Game win trackers
      p1GamesEl.style.display = isBo3 ? 'block' : 'none';
      p2GamesEl.style.display = isBo3 ? 'block' : 'none';
      p1GamesEl.textContent   = `${state.p1Games} Wins`;
      p2GamesEl.textContent   = `${state.p2Games} Wins`;

      // Visual swap
      playerBoard.style.flexDirection = state.isSwapped ? 'row-reverse' : 'row';
      document.getElementById('swapIcon').style.transform = state.isSwapped ? 'rotateY(180deg)' : 'none';

      const isDecider  = isBo3 && state.gameNum === 3;
      const swapAtTarget = isDecider && (state.p1 === SWAP_TARGET || state.p2 === SWAP_TARGET) && !isCurrentGameOver;

      const BASE_STATUS = 'text-base sm:text-lg font-bold mb-4 h-10 flex items-center justify-center rounded-lg tracking-wider transition-all duration-300';
      const SM_STATUS   = 'text-xs sm:text-sm font-bold mb-4 h-10 flex items-center justify-center rounded-lg tracking-wider px-2 transition-all duration-300';

      if (isCurrentGameOver) {
        if (isMatchOver) {
          const winner = virtualP1Games === 2 ? p1NameStr : p2NameStr;
          statusEl.textContent = `🏆 ${winner} WINS THE MATCH 🏆`;
          statusEl.className   = `text-lg sm:text-xl font-black text-amber-400 mb-4 h-10 flex items-center justify-center bg-amber-900/20 rounded-lg border border-amber-500/40 tracking-wider transition-all duration-300`;
          nextGameBtn.classList.add('hidden');
        } else if (isBo3) {
          statusEl.textContent = `🏸 Game ${state.gameNum} Complete!`;
          statusEl.className   = `${BASE_STATUS} text-cyan-400 bg-cyan-900/15`;
          nextGameBtn.classList.remove('hidden');
          timeMachine.classList.add('hidden');
        } else {
          statusEl.textContent = `🏆 Match Over!`;
          statusEl.className   = `${BASE_STATUS} text-amber-400 bg-white/5 border border-transparent`;
        }

        btn1.disabled        = true;
        btn2.disabled        = true;
        logistics1.className = 'invisible';
        logistics2.className = 'invisible';

      } else {
        nextGameBtn.classList.add('hidden');
        timeMachine.classList.remove('hidden');
        btn1.disabled = false;
        btn2.disabled = false;

        // ── Logistics ──
        const SERVING_CLS   = 'bg-black/40 border border-amber-500/60 rounded-lg p-2 mb-3 w-full h-12 flex flex-col justify-center items-center transition-all serve-glow';
        const RECEIVING_CLS = 'bg-black/20 border border-white/10 rounded-lg p-2 mb-3 w-full h-12 flex flex-col justify-center items-center opacity-50 transition-all';
        const SERVE_HTML    = (side) =>
          `<span class="text-amber-400 text-[10px] sm:text-xs font-bold uppercase tracking-widest block leading-tight">🏸 Serving</span>
           <span class="text-white text-xs sm:text-sm font-semibold leading-tight">${side}</span>`;
        const RECEIVE_HTML  =
          `<span class="text-white/40 text-[10px] sm:text-xs font-bold uppercase tracking-widest block leading-tight">Receiving</span>
           <span class="text-white/30 text-xs sm:text-sm font-semibold leading-tight">Ready</span>`;

        if (state.server === 1) {
          logistics1.className = SERVING_CLS;   logistics1.innerHTML = SERVE_HTML(getServeSide(state.p1));
          logistics2.className = RECEIVING_CLS; logistics2.innerHTML = RECEIVE_HTML;
        } else {
          logistics2.className = SERVING_CLS;   logistics2.innerHTML = SERVE_HTML(getServeSide(state.p2));
          logistics1.className = RECEIVING_CLS; logistics1.innerHTML = RECEIVE_HTML;
        }

        // ── Status bar ──
        if (swapAtTarget) {
          statusEl.innerHTML  = '<span class="animate-pulse text-rose-400">🔄 SWAP ENDS NOW 🔄</span>';
          statusEl.className  = `${BASE_STATUS} bg-rose-900/20 border border-rose-500/30`;
        } else if (isCapped) {
          statusEl.innerHTML  = `<span class="animate-pulse text-red-400">🚨 FIRST TO ${CAP_TARGET} WINS 🚨</span>`;
          statusEl.className  = `${SM_STATUS} bg-red-900/20 border border-red-500/30`;
        } else if (isDeuce) {
          statusEl.innerHTML  = `<span class="animate-pulse text-amber-400">🔥 GAME ${state.gameNum} DEUCE · Win by 2 🔥</span>`;
          statusEl.className  = `${SM_STATUS} bg-amber-900/20 border border-amber-500/30`;
        } else {
          statusEl.textContent = `Game ${state.gameNum} · First to ${WIN_TARGET}`;
          statusEl.className   = `${BASE_STATUS} text-white/45 bg-white/5 border border-transparent`;
        }
      }

      document.getElementById('undoBtn').disabled = currentStep === 0;
      document.getElementById('redoBtn').disabled = currentStep === matchHistory.length - 1;
      saveData();
    };
  </script>

</body>
</html>
